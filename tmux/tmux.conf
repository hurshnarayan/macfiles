set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Ctrl-a as leader (pure preference over default Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g status-style 'bg=#333333 fg=#5eacd3'

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
set -g base-index 1
set -g mouse on

# vi key movement for copy-mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Open new windows and splits in the CURRENT pane's directory
# (default tmux uses the session's start dir, which is rarely what you want)
bind c   new-window      -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Loud, unambiguous kill prompts. Default tmux just says "kill-pane 1?"
# which is easy to confuse with a window number.
bind x confirm-before -p "kill PANE ##{pane_index} [#{pane_current_command}] in window '#{window_name}'? (y/n)" kill-pane
bind & confirm-before -p "kill WINDOW ##{window_index} '#{window_name}' with #{window_panes} pane(s)? (y/n)" kill-window

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.config/scripts/tmux-sessionizer"

