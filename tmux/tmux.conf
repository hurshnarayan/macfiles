set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Ctrl-a as leader (pure preference over default Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# --- UI (minimal, sylvan-style) ---
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g status-interval 5
set -g status-left " #S "
set -g status-right " "
set -g status-left-length 40
set -g status-right-length 40
set -g window-status-separator ""
set -g window-status-format "#[fg=colour240] #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-current-format "#[fg=colour252,bold] #I:#W#{?window_flags,#{window_flags},} "
set -g renumber-windows on
bind b set -g status

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
set -g base-index 1
set -g mouse on

# vi key movement for copy-mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Open new windows and splits in the CURRENT pane's directory
# (default tmux uses the session's start dir, which is rarely what you want)
bind c   new-window      -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.config/scripts/tmux-sessionizer"

# PDF/epub picker → opens in sioyek (sylvan-style)
bind p run "tmux neww ~/.config/scripts/open-pdf.sh"

