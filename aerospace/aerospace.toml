# https://nikitabobko.github.io/AeroSpace/guide
# Inspired by sylvan's aerospace.toml but adapted to apps installed on this machine.

config-version = 2

start-at-login = true
automatically-unhide-macos-hidden-apps = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
persistent-workspaces = ['GHOSTTY', 'BROWSER', 'FINDER', 'DISCORD', 'MSG', 'NOTION', 'MAIL', 'SAFARI', 'SIOYEK', 'DAVINCI']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
# Layout and recovery
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout tiles horizontal horizontal'
alt-space = 'layout floating tiling'
alt-backtick = 'flatten-workspace-tree'
alt-equal = 'balance-sizes'
alt-semicolon = 'mode service'

# Vim-like focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Vim-like window moves
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Join-with (stack windows in a direction)
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'

# Resize
alt-cmd-h = 'resize width -60'
alt-cmd-j = 'resize height +60'
alt-cmd-k = 'resize height -60'
alt-cmd-l = 'resize width +60'

# Workspace switch: numbers jump to named workspaces
alt-1 = 'workspace GHOSTTY'
alt-2 = 'workspace BROWSER'
alt-3 = 'workspace FINDER'
alt-4 = 'workspace DISCORD'
alt-5 = 'workspace MSG'
alt-6 = 'workspace NOTION'
alt-7 = 'workspace MAIL'
alt-8 = 'workspace SAFARI'
alt-9 = 'workspace SIOYEK'
alt-0 = 'workspace DAVINCI'
alt-tab = 'workspace-back-and-forth'

# Send current window to workspace N
alt-shift-1 = 'move-node-to-workspace GHOSTTY'
alt-shift-2 = 'move-node-to-workspace BROWSER'
alt-shift-3 = 'move-node-to-workspace FINDER'
alt-shift-4 = 'move-node-to-workspace DISCORD'
alt-shift-5 = 'move-node-to-workspace MSG'
alt-shift-6 = 'move-node-to-workspace NOTION'
alt-shift-7 = 'move-node-to-workspace MAIL'
alt-shift-8 = 'move-node-to-workspace SAFARI'
alt-shift-9 = 'move-node-to-workspace SIOYEK'
alt-shift-0 = 'move-node-to-workspace DAVINCI'

# Monitor flow
alt-left = 'focus-monitor --wrap-around left'
alt-right = 'focus-monitor --wrap-around right'
alt-shift-left = 'move-node-to-monitor --focus-follows-window --wrap-around left'
alt-shift-right = 'move-node-to-monitor --focus-follows-window --wrap-around right'
alt-shift-m = 'move-workspace-to-monitor --wrap-around next'

# App launchers: alt+LETTER opens/focuses the app on its home workspace.
# Each runs aerospace-home.sh which launches the app if missing, then jumps to its workspace.
# Workspace map:
#   1 GHOSTTY  2 BROWSER  3 FINDER   4 DISCORD  5 MSG
#   6 NOTION   7 MAIL     8 SAFARI   9 SIOYEK   0 DAVINCI
alt-a = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh GHOSTTY com.mitchellh.ghostty"'
alt-w = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair BROWSER net.imput.helium"'
alt-e = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair FINDER com.apple.finder"'
alt-d = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair DISCORD com.hnc.Discord"'
alt-g = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair MSG com.apple.MobileSMS"'
alt-n = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair NOTION notion.id"'
alt-m = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair MAIL com.apple.mail"'
alt-s = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair SAFARI com.apple.Safari"'
alt-r = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair SIOYEK info.sioyek.sioyek"'
alt-v = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair DAVINCI com.blackmagic-design.DaVinciResolve"'
# OBS shares DAVINCI workspace (both media work)
alt-o = 'exec-and-forget /bin/bash -lc "$HOME/.config/scripts/aerospace-home.sh --repair DAVINCI com.obsproject.obs-studio"'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
b = ['balance-sizes', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
h = ['focus-monitor --wrap-around left', 'mode main']
l = ['focus-monitor --wrap-around right', 'mode main']
shift-h = ['move-node-to-monitor --focus-follows-window --wrap-around left', 'mode main']
shift-l = ['move-node-to-monitor --focus-follows-window --wrap-around right', 'mode main']
m = ['move-workspace-to-monitor --wrap-around next', 'mode main']

# Auto-route windows to their home workspace on open
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace GHOSTTY'

[[on-window-detected]]
if.app-id = 'net.imput.helium'
run = 'move-node-to-workspace BROWSER'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
run = 'move-node-to-workspace BROWSER'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace FINDER'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace DISCORD'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace MSG'

[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace NOTION'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace MAIL'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace SAFARI'

[[on-window-detected]]
if.app-id = 'info.sioyek.sioyek'
run = 'move-node-to-workspace SIOYEK'

[[on-window-detected]]
if.app-id = 'com.blackmagic-design.DaVinciResolve'
run = 'move-node-to-workspace DAVINCI'

[[on-window-detected]]
if.app-id = 'com.obsproject.obs-studio'
run = 'move-node-to-workspace DAVINCI'
